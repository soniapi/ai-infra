name: Deploy to Google Cloud Run

on:
  push:
    branches: [ "master" ]

env:
  PROJECT_ID: ai-infra-grpc
  REGION: us-central1
  SERVICE: rest-api

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

    - name: 'Set up Docker Buildx'
      uses: docker/setup-buildx-action@v3

    - id: 'deploy'
      name: 'Deploy to Cloud Run'
      uses: 'google-github-actions/deploy-cloudrun@v2'
      with:
        service: '${{ env.SERVICE }}'
        region: '${{ env.REGION }}'
        source: '.'
        project_id: '${{ env.PROJECT_ID }}'
        flags: '--allow-unauthenticated --port=8080'

    - name: 'Fetch and Prepare DATABASE_URL'
      run: |
        DB_URL=$(gcloud secrets versions access latest --secret="DATABASE_URL")
        echo "::add-mask::$DB_URL"
        # Use localhost:5433 to avoid conflicts on 5432
        TUNNEL_URL=$(echo $DB_URL | sed 's/10\.128\.0\.3:5432/localhost:5433/')
        echo "DATABASE_URL=$TUNNEL_URL" >> $GITHUB_ENV

    - name: 'Open Secure Tunnel'
      run: |
        # Redirect output to a log file to help debug if it fails again
        gcloud compute start-iap-tunnel postgres-vm 5432 \
            --local-host-port=localhost:5433 \
            --zone=us-central1-c > iap_log.txt 2>&1 &
        sleep 10
        # Optional: Print the log if the next step fails
        cat iap_log.txt

    - name: 'Install dependencies for tests'
      run: sudo apt-get update && sudo apt-get install -y libpq-dev

    - name: Install diesel_cli
      run: cargo install diesel_cli --no-default-features --features postgres

    - name: Run migrations
      # This step now uses the updated DATABASE_URL pointing to localhost
      run: diesel setup

    - name: 'Run Integration Tests'
      run: |
        cargo test --test integration_tests
